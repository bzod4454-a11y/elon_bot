version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    networks:
      - elonbot_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: always
    depends_on:
      - api
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - elonbot_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - elonbot_network

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: elonbot
      POSTGRES_USER: elonbot
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elonbot_network
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - elonbot_network
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:

networks:
  elonbot_network:
    driver: bridge