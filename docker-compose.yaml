version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - elonbot_network

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    depends_on:
      - api
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - elonbot_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./static:/usr/share/nginx/html
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - elonbot_network

networks:
  elonbot_network:
    driver: bridge